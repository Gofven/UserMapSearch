name: dockerpostgis

services:
  db:
    image: postgis/postgis  # Postgis container lacks healthcheck
    restart: always
    env_file:
      - path: ./.env
        required: false
    ports:
      - ${DB_PORT:-5432}:${DB_PORT:-5432}
    environment:
      PGPORT: ${DB_PORT:-5432}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-postgres}
    volumes:
      - .pg_data:/var/lib/postgresql/data

  django:
    build: .
    restart: unless-stopped
    env_file:
      - path: ./.env
        required: false
    ports:
      - ${PORT:-8000}:8000
    volumes:
      - ./backend:/app/backend
      - ./mapsearch:/app/mapsearch
    environment:
      DEBUG: ${DEBUG}
      DB_NAME: ${DB_NAME:-postgres}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
